<!DOCTYPE html>
<html data-theme="dark" data-lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MeshCompact</title>
<script>
(function(){
  try{var s=JSON.parse(localStorage.getItem('mesh-settings')||'{}');
  var t=s.theme||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
  document.documentElement.setAttribute('data-theme',t);}catch(e){}
})();
</script>
<link rel="icon" type="image/svg+xml" href="src/icon/icon.svg">
<link rel="apple-touch-icon" href="src/icon/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="preload" href="i18n/ru.txt" as="fetch" crossorigin>
<link rel="preload" href="i18n/en.txt" as="fetch" crossorigin>
<link rel="preload" href="swap_rules.txt" as="fetch" crossorigin>
</head>
<body>

<div class="app">
  <div class="app-header"><img src="src/icon/icon.svg" width="18" height="18" style="vertical-align:-3px;margin-right:6px" alt="">MeshCompact</div>
  <textarea id="input" placeholder="Введите текст…" spellcheck="false"
            autocorrect="off" autocapitalize="off"></textarea>

  <div class="stats-row">
    <span id="stats"></span>
    <div class="popup" id="popup"><div class="popup-box" id="popup-box">Скопировано!</div></div>
  </div>

  <div class="result-wrap">
    <div id="result" onclick="resultClick()"></div>
    <button class="clip-btn" id="clip-btn" onclick="copyResult()" aria-label="Copy">
      <svg class="icon-clip" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="4" rx="1"/>
        <path d="M17 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      </svg>
      <svg class="icon-check" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </button>
  </div>

  <div class="slider-section">
    <div class="slider-wrap">
      <input type="range" id="level-slider" min="1" max="4" value="2" step="1">
    </div>
  </div>
</div>

<footer style="visibility:hidden">
  <a href="https://github.com/Eloren1/MeshCompact" id="src-link" target="_blank" rel="noopener">Исходный код</a><span class="f-sep" id="f-sep-1">&ensp;·&ensp;</span><span id="local-note">Текст обрабатывается локально на вашем устройстве</span><span class="f-sep" id="f-sep-2">&ensp;·&ensp;</span><a href="#" id="settings-link">Настройки</a>
</footer>

<!-- Settings Modal -->
<div class="s-overlay" id="s-overlay">
  <div class="s-box">
    <div class="s-header">
      <span class="s-title" id="s-title">Настройки</span>
      <button class="s-x" id="s-x" aria-label="Close">✕</button>
    </div>
    <div class="s-body">
      <div class="s-row">
        <span id="s-lang-lbl">Язык</span>
        <select id="s-lang">
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="s-row">
        <span id="s-theme-lbl">Тема</span>
        <select id="s-theme">
          <option value="light" id="s-theme-light">Светлая</option>
          <option value="dark" id="s-theme-dark">Темная</option>
          <option value="black" id="s-theme-black">Чёрная</option>
          <option value="mirror" id="s-theme-mirror">Зеркало</option>
          <option value="beige" id="s-theme-beige">Бежевая</option>
        </select>
      </div>
      <div class="s-row s-row-check">
        <label for="s-copy-click" id="s-copy-lbl">Копировать по нажатию на поле вывода</label>
        <input type="checkbox" id="s-copy-click" checked>
      </div>
      <div class="s-row s-row-check">
        <label for="s-save-text" id="s-save-text-lbl">Сохранять текст перед уходом</label>
        <input type="checkbox" id="s-save-text" checked>
      </div>
      <div class="s-row s-row-check">
        <label for="s-highlight" id="s-highlight-lbl">Выделять цветом замененные символы</label>
        <input type="checkbox" id="s-highlight">
      </div>
      <div class="s-row">
        <button class="s-swap-rules-btn" id="s-swap-rules-btn">Настроить правила замены символов</button>
      </div>
<div class="s-row s-row-install" id="s-install-row" style="display:none">
        <button class="s-swap-rules-btn" id="s-install-btn">Добавить на рабочий стол</button>
        <div class="s-install-hint" id="s-install-hint" style="display:none"></div>
      </div>
    </div>
    <div class="s-footer">
      <button class="s-close-btn" id="s-close-btn">Закрыть</button>
    </div>
  </div>
</div>

<!-- Swap Rules Modal -->
<div class="s-overlay" id="sr-overlay">
  <div class="s-box s-box-tall">
    <div class="s-header">
      <span class="s-title" id="sr-title">Правила замены символов</span>
      <button class="s-x" id="sr-x" aria-label="Close">✕</button>
    </div>
    <div class="s-body s-body-grow">
      <textarea id="sr-textarea" class="sr-textarea" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div class="s-footer s-footer-two">
      <button class="s-close-btn s-cancel-btn" id="sr-cancel">Отмена</button>
      <button class="s-close-btn s-save-btn" id="sr-save">Сохранить</button>
    </div>
  </div>
</div>

<script>
let MAPS = [null, {}, {}, {}, {}];
let defaultMapsTxt = '';

function parseMaps(text) {
  const maps = [null];
  let cur = null;
  for (const line of text.split('\n')) {
    const t = line.trim();
    const m = t.match(/^\[(\d+)\]$/);
    if (m) { cur = {}; maps[parseInt(m[1])] = cur; }
    else if (cur && t.length >= 3 && t[1] === '=') cur[t[0]] = t[2];
  }
  return maps;
}

const LEVEL_COLORS = ['','var(--lc-1)','var(--lc-2)','var(--lc-3)','var(--lc-4)'];

const I18N = {};
let installPrompt = null;

function detectIOS() {
  return /iP(hone|od|ad)/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installPrompt = e;
  if (!isStandalone()) {
    document.getElementById('s-install-hint').style.display = 'none';
    document.getElementById('s-install-row').style.display = '';
  }
});

function detectBrowserLang() {
  return (navigator.language || 'en').toLowerCase().startsWith('ru') ? 'ru' : 'en';
}

function parseTxt(text) {
  const out = {};
  for (const line of text.split('\n')) {
    const i = line.indexOf('=');
    if (i < 0) continue;
    out[line.slice(0, i).trim()] = line.slice(i + 1).trimEnd();
  }
  return out;
}

function makeI18N(raw) {
  return {
    ...raw,
    statsBytes: ob => raw.statsBytes.replace('{ob}', ob),
    statsLine: (ob, cb, pct) =>
      raw.statsLine
        .replace('{ob}', ob)
        .replace('{cb}', cb).replace('{pct}', pct),
  };
}

function detectBrowserTheme() {
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
const DEFAULT_SETTINGS = { lang: detectBrowserLang(), theme: detectBrowserTheme(), copyOnClick: true, saveText: true, highlight: true };
let settings = { ...DEFAULT_SETTINGS };
try { Object.assign(settings, JSON.parse(localStorage.getItem('mesh-settings') || '{}')); } catch {}

if (!['ru', 'en'].includes(settings.lang)) settings.lang = detectBrowserLang();
let lang = settings.lang;

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}

function applyLang(l) {
  lang = l;
  document.documentElement.setAttribute('data-lang', l);
  const t = I18N[l];
  document.getElementById('input').placeholder          = t.placeholder;
  document.getElementById('src-link').textContent       = t.srcLink;
  document.getElementById('local-note').textContent     = t.localNote;
  document.getElementById('settings-link').textContent  = t.settingsLink;
  document.getElementById('popup-box').textContent      = t.copied;
  document.getElementById('s-title').textContent        = t.sTitle;
  document.getElementById('s-lang-lbl').textContent     = t.sLangLbl;
  document.getElementById('s-theme-lbl').textContent    = t.sThemeLbl;
  document.getElementById('s-theme-dark').textContent   = t.sThemeDark;
  document.getElementById('s-theme-black').textContent  = t.sThemeBlack;
  document.getElementById('s-theme-light').textContent  = t.sThemeLight;
  document.getElementById('s-theme-mirror').textContent = t.sThemeMirror;
  document.getElementById('s-theme-beige').textContent  = t.sThemeBeige;
  document.getElementById('s-copy-lbl').textContent     = t.sCopyLbl;
  document.getElementById('s-save-text-lbl').textContent = t.sSaveTextLbl;
  document.getElementById('s-highlight-lbl').textContent = t.sHighlightLbl;
  document.getElementById('s-close-btn').textContent    = t.sCloseBtn;
  document.getElementById('s-swap-rules-btn').textContent = t.sSwapRulesBtn;
  document.getElementById('s-install-btn').textContent   = t.sInstallBtn;
  document.getElementById('s-install-hint').innerHTML = t.sInstallHint.replace('{icon}', '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 48 48" style="vertical-align:-4px" aria-hidden="true"><path d="M35.274 15.838H31.18a1.5 1.5 0 1 0 0 3h4.095c.827 0 1.5.673 1.5 1.5v19.616c0 .827-.673 1.5-1.5 1.5H12.726c-.827 0-1.5-.673-1.5-1.5V20.338c0-.827.673-1.5 1.5-1.5h4.095a1.5 1.5 0 1 0 0-3h-4.095a4.505 4.505 0 0 0-4.5 4.5v19.616c0 2.481 2.019 4.5 4.5 4.5h22.549c2.481 0 4.5-2.019 4.5-4.5V20.338a4.506 4.506 0 0 0-4.501-4.5zM18.407 12.81l4.143-4.143v19.748a1.5 1.5 0 1 0 3 0V8.667l4.143 4.143c.293.293.677.439 1.061.439s.768-.146 1.061-.439a1.5 1.5 0 0 0 0-2.121l-6.703-6.704a1.5 1.5 0 0 0-2.122 0l-6.704 6.704a1.5 1.5 0 1 0 2.121 2.121z" fill="currentColor"/></svg>');
  document.getElementById('sr-title').textContent       = t.sSwapRulesTitle;
  document.getElementById('sr-cancel').textContent      = t.sSwapRulesCancel;
  document.getElementById('sr-save').textContent        = t.sSwapRulesSave;
  updateStats();
}

function saveSettings() {
  localStorage.setItem('mesh-settings', JSON.stringify(settings));
}

const savedLevel = parseInt(localStorage.getItem('mesh-level'));
let level = (savedLevel >= 1 && savedLevel <= 4) ? savedLevel : 2;
let resultText = '';

function mergedMap(n) {
  const m = {};
  for (let i = 1; i <= n; i++) Object.assign(m, MAPS[i]);
  return m;
}

function byteLen(str) {
  let n = 0;
  for (const ch of str) n += ch.codePointAt(0) < 128 ? 1 : 2;
  return n;
}

function esc(s) {
  return s === '&' ? '&amp;' : s === '<' ? '&lt;' : s === '>' ? '&gt;' : s;
}

function updateHandleColor(val) {
  document.documentElement.style.setProperty('--handle-color', LEVEL_COLORS[val]);
}

function compress(n) {
  const text = document.getElementById('input').value;
  if (!text) return;
  level = n;
  const map = mergedMap(n);
  const orig = [...text];
  const res  = orig.map(ch => map[ch] ?? ch);
  resultText = res.join('');

  let html = '';
  for (let i = 0; i < res.length; i++) {
    const ch = res[i];
    if (ch === '\n') { html += '\n'; continue; }
    html += (orig[i] !== ch && settings.highlight) ? `<span class="c">${esc(ch)}</span>` : esc(ch);
  }
  document.getElementById('result').innerHTML = html;
  updateStats();
}

function updateStats() {
  const input = document.getElementById('input').value;
  const el = document.getElementById('stats');
  const t = I18N[lang];
  const ob = byteLen(input);

  if (!ob) { el.textContent = ''; return; }
  if (!resultText) { el.textContent = t.statsBytes(ob); return; }

  const cb = byteLen(resultText);
  const pct = Math.round((ob - cb) / ob * 200);
  el.textContent = t.statsLine(ob, cb, pct);
}

let popTimer, clipTimer;
function showPopup() {
  const p = document.getElementById('popup');
  p.classList.add('show');
  clearTimeout(popTimer);
  popTimer = setTimeout(() => p.classList.remove('show'), 1400);
}
function showCheckmark() {
  const btn = document.getElementById('clip-btn');
  btn.classList.add('copied');
  clearTimeout(clipTimer);
  clipTimer = setTimeout(() => btn.classList.remove('copied'), 1400);
}

async function copyResult() {
  if (!resultText) return;
  try {
    await navigator.clipboard.writeText(resultText);
  } catch {
    const ta = Object.assign(document.createElement('textarea'),
      {value: resultText, style: 'position:fixed;opacity:0'});
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  showPopup();
  showCheckmark();
}

function updateResultCursor() {
  document.getElementById('result').classList.toggle('clickable', settings.copyOnClick);
}

function resultClick() {
  if (settings.copyOnClick) copyResult();
}

function openSettings() {
  document.getElementById('s-lang').value = settings.lang;
  document.getElementById('s-theme').value = settings.theme;
  document.getElementById('s-copy-click').checked = settings.copyOnClick;
  document.getElementById('s-save-text').checked = settings.saveText;
  document.getElementById('s-highlight').checked = settings.highlight;
  document.getElementById('s-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('s-overlay').classList.remove('open');
}

function openSwapRules() {
  const custom = localStorage.getItem('mesh-swap-rules');
  document.getElementById('sr-textarea').value = custom !== null ? custom : defaultMapsTxt;
  document.getElementById('sr-overlay').classList.add('open');
}

function closeSwapRules() {
  document.getElementById('sr-overlay').classList.remove('open');
}

function saveSwapRules() {
  const txt = document.getElementById('sr-textarea').value;
  localStorage.setItem('mesh-swap-rules', txt);
  MAPS = parseMaps(txt);
  const inputEl = document.getElementById('input');
  if (inputEl.value) compress(level);
  closeSwapRules();
}

async function initApp() {
  if (!isStandalone() && !installPrompt && detectIOS()) {
    document.getElementById('s-install-row').style.display = '';
    if (localStorage.getItem('mesh-install-hint')) {
      document.getElementById('s-install-btn').style.display = 'none';
      document.getElementById('s-install-hint').style.display = '';
    }
  }

  const isFirstVisit = !localStorage.getItem('mesh-visited');
  localStorage.setItem('mesh-visited', '1');

  const fetches = [
    fetch('i18n/ru.txt').then(r => r.text()),
    fetch('i18n/en.txt').then(r => r.text()),
    fetch('swap_rules.txt').then(r => r.text()),
  ];
  const [ruTxt, enTxt, mapsTxt] = await Promise.all(fetches);
  I18N.ru = makeI18N(parseTxt(ruTxt));
  I18N.en = makeI18N(parseTxt(enTxt));
  defaultMapsTxt = mapsTxt;
  const customMapsTxt = localStorage.getItem('mesh-swap-rules');
  MAPS = parseMaps(customMapsTxt !== null ? customMapsTxt : mapsTxt);

  applyTheme(settings.theme);
  applyLang(lang);
  document.querySelector('footer').style.visibility = '';
  updateResultCursor();

  const inputEl = document.getElementById('input');

  const SAMPLE_TEXT = 'Скрывать свои чувства, следить за выражением лица, поступать так, как поступают другие, — все это стало инстинктивной реакцией человека.';

  if (isFirstVisit) {
    inputEl.value = SAMPLE_TEXT;
    compress(level);
  } else {
    const saved = settings.saveText ? (localStorage.getItem('mesh-text') || '') : '';
    inputEl.value = saved;
    if (saved) compress(level);
    else updateStats();
  }

  const slider = document.getElementById('level-slider');
  slider.value = level;
  updateHandleColor(level);

  slider.addEventListener('touchstart', () => {
    document.activeElement?.blur();
  }, { passive: true });

  slider.addEventListener('input', function() {
    level = parseInt(this.value);
    localStorage.setItem('mesh-level', level);
    updateHandleColor(level);
    if (inputEl.value) compress(level);
  });

  function updateSliderFromPointer(e) {
    const rect = slider.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    const min = parseInt(slider.min);
    const max = parseInt(slider.max);
    const newVal = Math.round(min + ratio * (max - min));
    if (parseInt(slider.value) !== newVal) {
      slider.value = newVal;
      slider.dispatchEvent(new Event('input'));
    }
  }
  slider.addEventListener('pointerdown', e => {
    slider.setPointerCapture(e.pointerId);
    updateSliderFromPointer(e);
  });
  slider.addEventListener('pointermove', e => {
    if (!e.buttons) return;
    updateSliderFromPointer(e);
  });

  window.addEventListener('beforeunload', () => {
    if (settings.saveText) localStorage.setItem('mesh-text', inputEl.value);
    else localStorage.removeItem('mesh-text');
  });

  inputEl.addEventListener('input', () => {
    if (!inputEl.value) {
      resultText = '';
      document.getElementById('result').innerHTML = '';
      updateStats();
      return;
    }
    compress(level);
  });

  document.getElementById('settings-link').addEventListener('click', e => {
    e.preventDefault();
    openSettings();
  });

  document.getElementById('s-x').addEventListener('click', closeSettings);
  document.getElementById('s-close-btn').addEventListener('click', closeSettings);
  document.getElementById('s-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('s-overlay')) closeSettings();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeSettings(); closeSwapRules(); }
  });

  document.getElementById('s-lang').addEventListener('change', function() {
    settings.lang = this.value;
    lang = this.value;
    applyLang(lang);
    saveSettings();
  });

  document.getElementById('s-theme').addEventListener('change', function() {
    settings.theme = this.value;
    applyTheme(this.value);
    saveSettings();
  });

  document.getElementById('s-copy-click').addEventListener('change', function() {
    settings.copyOnClick = this.checked;
    saveSettings();
    updateResultCursor();
  });

  document.getElementById('s-save-text').addEventListener('change', function() {
    settings.saveText = this.checked;
    saveSettings();
  });

  document.getElementById('s-highlight').addEventListener('change', function() {
    settings.highlight = this.checked;
    saveSettings();
    const inputEl = document.getElementById('input');
    if (inputEl.value) compress(level);
  });

  document.getElementById('s-swap-rules-btn').addEventListener('click', openSwapRules);
  document.getElementById('s-install-btn').addEventListener('click', () => {
    if (installPrompt) {
      installPrompt.prompt();
      installPrompt.userChoice.then(() => {
        installPrompt = null;
        document.getElementById('s-install-row').style.display = 'none';
      });
    } else {
      if (navigator.share) navigator.share({ title: document.title, url: location.href }).catch(() => {});
      localStorage.setItem('mesh-install-hint', '1');
      document.getElementById('s-install-btn').style.display = 'none';
      document.getElementById('s-install-hint').style.display = '';
    }
  });
  document.getElementById('sr-x').addEventListener('click', closeSwapRules);
  document.getElementById('sr-cancel').addEventListener('click', closeSwapRules);
  document.getElementById('sr-save').addEventListener('click', saveSwapRules);
  document.getElementById('sr-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('sr-overlay')) closeSwapRules();
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}

initApp();
</script>
</body>
</html>
