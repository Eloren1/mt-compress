<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Compress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <textarea id="input" placeholder="Введите текст…" spellcheck="false"
            autocorrect="off" autocapitalize="off"></textarea>

  <div class="stats-row">
    <span id="stats">Введите текст</span>
    <button class="cp" onclick="copyResult()">COPY</button>
  </div>

  <div id="result" onclick="copyResult()"></div>

  <div class="slider-section">
    <div class="slider-wrap">
      <input type="range" id="level-slider" min="1" max="4" value="1" step="1">
      <div class="slider-ticks" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </div>
  </div>

</div>

<footer>
  <a href="#" id="src-link">Открытый исходный код</a>&ensp;·&ensp;Текст обрабатывается локально на вашем устройстве&ensp;·&ensp;<a href="#" id="settings-link">Настройки</a>
</footer>

<div class="popup" id="popup"><div class="popup-box">Copied!</div></div>

<script>
const MAPS = [
  null,
  {а:'a',е:'e',ё:'e',о:'o',р:'p',с:'c',у:'y',х:'x',
   А:'A',В:'B',Е:'E',Ё:'E',З:'3',К:'K',Н:'H',О:'O',
   Р:'P',С:'C',Т:'T',Х:'X','«':'"','»':'"',М:'M'},
  {б:'6',г:'r',и:'u',п:'n'},
  {к:'k',ь:'b',У:'Y',д:'d'},
  {з:'3',т:'t',ч:'4',ш:'w',щ:'w',Ч:'4',Ш:'W',Щ:'W','—':'-'}
];

const LEVEL_COLORS = ['', 'var(--lc-1)', 'var(--lc-2)', 'var(--lc-3)', 'var(--lc-4)'];

const saved = parseInt(localStorage.getItem('mt-level'));
let level = (saved >= 1 && saved <= 4) ? saved : 1;
let resultText = '';

function mergedMap(n) {
  const m = {};
  for (let i = 1; i <= n; i++) Object.assign(m, MAPS[i]);
  return m;
}

function byteLen(str) {
  let n = 0;
  for (const ch of str) n += ch.codePointAt(0) < 128 ? 1 : 2;
  return n;
}

function esc(s) {
  return s === '&' ? '&amp;' : s === '<' ? '&lt;' : s === '>' ? '&gt;' : s;
}

function updateHandleColor(val) {
  document.documentElement.style.setProperty('--handle-color', LEVEL_COLORS[val]);
}

function compress(n) {
  const text = document.getElementById('input').value;
  if (!text) return;
  level = n;
  const map = mergedMap(n);
  const orig = [...text];
  const res  = orig.map(ch => map[ch] ?? ch);
  resultText = res.join('');

  let html = '';
  for (let i = 0; i < res.length; i++) {
    const ch = res[i];
    if (ch === '\n') { html += '\n'; continue; }
    html += orig[i] !== ch
      ? `<span class="c">${esc(ch)}</span>`
      : esc(ch);
  }
  document.getElementById('result').innerHTML = html;
  updateStats();
}

function updateStats() {
  const input = document.getElementById('input').value;
  const el = document.getElementById('stats');
  const ob = byteLen(input);

  if (!ob) { el.textContent = 'Введите текст'; return; }

  if (!resultText) {
    el.textContent = `${ob} байт`;
    return;
  }

  const cb = byteLen(resultText);
  const pct = Math.round((ob - cb) / ob * 100);
  const p = Math.ceil(cb / 200);
  el.textContent = `Сжатие: ${level}   ·   ${ob} → ${cb}   ·   −${pct}%   ·   ${p} пак.`;
}

let popTimer;
function showPopup() {
  const p = document.getElementById('popup');
  p.classList.add('show');
  clearTimeout(popTimer);
  popTimer = setTimeout(() => p.classList.remove('show'), 1100);
}

async function copyResult() {
  if (!resultText) return;
  try {
    await navigator.clipboard.writeText(resultText);
  } catch {
    const t = Object.assign(document.createElement('textarea'),
      {value: resultText, style: 'position:fixed;opacity:0'});
    document.body.appendChild(t);
    t.select();
    document.execCommand('copy');
    t.remove();
  }
  showPopup();
}

const slider = document.getElementById('level-slider');
slider.value = level;
updateHandleColor(level);

slider.addEventListener('input', function() {
  level = parseInt(this.value);
  localStorage.setItem('mt-level', level);
  updateHandleColor(level);
  if (document.getElementById('input').value) compress(level);
});

document.getElementById('input').addEventListener('input', () => {
  const val = document.getElementById('input').value;
  if (!val) {
    resultText = '';
    document.getElementById('result').innerHTML = '';
    updateStats();
    return;
  }
  compress(level);
});
</script>
</body>
</html>
